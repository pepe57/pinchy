name: Deploy Docs (no screenshots)

on:
  # Manual-only fallback for urgent text-only fixes between releases, when
  # regenerating screenshots is unnecessary or infeasible. The normal release
  # path is release.yml → screenshots.yml, which captures fresh screenshots
  # against the just-released build and then deploys the docs. This workflow
  # deploys docs with whatever screenshots are already in the artifact store —
  # intended for typo fixes, not feature changes.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: pnpm build
        env:
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_DOCS_WEBSITE_ID }}
          # Authenticates the GitHub releases loader (Releases page) so it isn't
          # rate-limited and returns the live release list. github.token has
          # read access to this repo's releases — no PAT setup needed.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
