name: Screenshots

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  capture:
    name: Capture screenshots
    runs-on: ubuntu-latest
    # docker-compose.yml requires PINCHY_VERSION since
    # 0a1e4ebd2 (feat(compose): pin image versions via PINCHY_VERSION env
    # var). The job builds production images locally with tag :latest, so
    # this job uses "latest" rather than the release tag — the locally-
    # built layers never get pushed and the deployed docs site only cares
    # about the rendered screenshots, not which tag produced them.
    env:
      PINCHY_VERSION: latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - uses: ./.github/actions/setup-playwright

      - name: Install Geist font
        run: |
          mkdir -p ~/.local/share/fonts
          curl -fsSL -o /tmp/geist.zip "https://github.com/vercel/geist-font/releases/download/1.8.0/geist-font-1.8.0.zip"
          unzip -o /tmp/geist.zip -d /tmp/geist
          find /tmp/geist -name '*.ttf' -o -name '*.otf' | xargs -I{} cp {} ~/.local/share/fonts/
          fc-cache -fv

      - name: Generate enterprise key for screenshots
        id: license
        run: |
          TOKEN=$(PINCHY_LICENSE_PRIVATE_KEY="${{ secrets.PINCHY_LICENSE_PRIVATE_KEY }}" \
            pnpm -C packages/web exec tsx ../../scripts/generate-license.ts \
            --org "Acme Corp (Screenshots)" --type trial --days 14)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/docker-mirror

      - name: Build production images locally
        run: |
          docker build -t ghcr.io/heypinchy/pinchy:latest -f Dockerfile.pinchy .
          docker build -t ghcr.io/heypinchy/pinchy-openclaw:latest -f Dockerfile.openclaw .

      - name: Start Pinchy stack
        run: docker compose up -d
        env:
          BETTER_AUTH_SECRET: screenshot-session-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PINCHY_ENTERPRISE_KEY: ${{ steps.license.outputs.token }}

      - name: Seed demo data
        run: ./screenshots/seed.sh
        env:
          PINCHY_ENTERPRISE_KEY: ${{ steps.license.outputs.token }}

      - name: Prepare output directory
        run: mkdir -p ${{ github.workspace }}/screenshots/output

      - name: Capture screenshots
        run: pnpm -C packages/web exec playwright test --config=../../screenshots/playwright.config.ts
        env:
          BASE_URL: http://localhost:7777
          SCREENSHOT_DIR: ${{ github.workspace }}/screenshots/output

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v7
        with:
          name: pinchy-screenshots
          path: screenshots/output/
          retention-days: 90

      - name: Upload to release assets
        # When invoked via workflow_call from release.yml (tag push), attach
        # the screenshots tarball to the GitHub Release created in release.yml.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd screenshots/output
          tar czf /tmp/pinchy-screenshots.tar.gz *.png
          gh release upload "${{ github.ref_name }}" \
            /tmp/pinchy-screenshots.tar.gz \
            --clobber

      - name: Notify website repo
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api repos/heypinchy/website/dispatches \
            -f event_type=screenshots-updated \
            -f "client_payload[run_id]=${{ github.run_id }}" \
            || echo "⚠️ Website dispatch failed (token may not be configured)"

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy-docs:
    name: Build and Deploy Docs
    needs: capture
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download screenshots
        uses: actions/download-artifact@v8
        with:
          name: pinchy-screenshots
          path: docs/public/screenshots/

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: pnpm build
        env:
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_DOCS_WEBSITE_ID }}
          # Authenticates the GitHub releases loader (Releases page) so it isn't
          # rate-limited and returns the live release list. github.token has
          # read access to this repo's releases — no PAT setup needed.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
