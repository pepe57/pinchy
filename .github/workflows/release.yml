name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to republish images for (e.g. v0.4.4). Builds & pushes Docker images only — does NOT re-create the GitHub Release or redeploy docs."
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      # Point buildkit at mirror.gcr.io as a pull-through cache for Docker
      # Hub (same reason as .github/actions/docker-mirror in CI — avoids the
      # 200 pulls/6h rate limit). buildx runs in its own buildkit container,
      # so /etc/docker/daemon.json doesn't apply; we configure it here.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag (drops leading 'v' for image labels)
        id: release-tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Build-time guard for the v0.5.5 drift: `gh release create` skipped the
      # `pnpm release` version bump, so the images reported a stale
      # `pinchyVersion` despite the tag. This fails the workflow before any
      # GHCR push, so a botched release leaves no artifact to clean up.
      - name: Assert package.json versions match the release tag
        # Pass the tag via env (not inline ${{ }}) so the value never reaches
        # the shell as interpolated text — same expression-injection-safe
        # pattern as the Layer 3 smoke check below.
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: node scripts/assert-package-version.mjs "$RELEASE_TAG"

      - name: Extract metadata (tags, labels)
        id: meta-pinchy
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/heypinchy/pinchy
          tags: |
            type=semver,pattern=v{{version}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            # `:latest` is only updated by tag-push (the canonical release
            # event). workflow_dispatch republishes a specific tag and must
            # not move `:latest` — that would silently downgrade users who
            # pin to `:latest` if an older tag is republished.
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push Pinchy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.pinchy
          push: true
          tags: ${{ steps.meta-pinchy.outputs.tags }}
          labels: ${{ steps.meta-pinchy.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PINCHY_VERSION=${{ steps.release-tag.outputs.version }}
            PINCHY_BUILD_SHA=${{ github.sha }}

      - name: Extract metadata for OpenClaw image
        id: meta-openclaw
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/heypinchy/pinchy-openclaw
          tags: |
            type=semver,pattern=v{{version}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            # `:latest` is only updated by tag-push (the canonical release
            # event). workflow_dispatch republishes a specific tag and must
            # not move `:latest` — that would silently downgrade users who
            # pin to `:latest` if an older tag is republished.
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push OpenClaw image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.openclaw
          push: true
          tags: ${{ steps.meta-openclaw.outputs.tags }}
          labels: ${{ steps.meta-openclaw.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PINCHY_VERSION=${{ steps.release-tag.outputs.version }}
            PINCHY_BUILD_SHA=${{ github.sha }}

  end-user-install-published:
    name: End-user install (published images)
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v7

      - name: Ensure no GHCR credentials
        run: docker logout ghcr.io || true

      - name: Prepare clean install directory
        id: install-dir
        run: |
          INSTALL_DIR=$(mktemp -d)
          cp docker-compose.yml "$INSTALL_DIR/"
          echo "path=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "Clean install dir: $INSTALL_DIR"
          ls -la "$INSTALL_DIR"

      - name: Write .env with this release's version
        working-directory: ${{ steps.install-dir.outputs.path }}
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          {
            echo "PINCHY_VERSION=${RELEASE_TAG}"
            echo "DB_PASSWORD=$(openssl rand -hex 32)"
          } > .env
          # BETTER_AUTH_SECRET + ENCRYPTION_KEY remain unset on purpose —
          # tests Pinchy's auto-generation path (used by end-users who
          # don't customize .env). See docs/plans/2026-04-24-scope2-*.md.
          cat .env | sed 's/=.*/=<redacted>/'

      - name: Pull images anonymously (fails loudly if GHCR is private)
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose pull

      - name: Start stack from clean install dir
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose up -d

      - name: Wait for health
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Stack healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose ps
              docker compose logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "::error::Published-image install health check failed"
          docker compose ps
          docker compose logs
          exit 1

      # Runtime side of the v0.5.5 guard: /api/version reports
      # packages/web/package.json#version (baked into NEXT_PUBLIC_PINCHY_VERSION
      # at build time). Asserting it here catches any path that produces a
      # runtime/tag mismatch — including future changes to where pinchyVersion
      # is sourced — not just the package.json drift Layer 2 covers.
      - name: Assert /api/version reports the released version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          EXPECTED="${RELEASE_TAG#v}"
          # Capture curl separately so a non-responding endpoint produces a
          # clear message instead of an opaque pipefail abort mid-step.
          if ! RESPONSE=$(curl -sf http://localhost:7777/api/version); then
            echo "::error::/api/version did not respond on the published stack."
            docker compose logs --tail=20 pinchy
            exit 1
          fi
          REPORTED=$(echo "$RESPONSE" | jq -r '.pinchyVersion')
          echo "Reported pinchyVersion: '$REPORTED' (expected '$EXPECTED')"
          if [ "$REPORTED" != "$EXPECTED" ]; then
            echo "::error::/api/version reports '$REPORTED' but release is ${RELEASE_TAG}. The release was likely cut without 'pnpm release', leaving package.json#version stale."
            docker compose logs --tail=20 pinchy
            exit 1
          fi

      - name: Assert all services running
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          RUNNING=$(docker compose ps --format json | jq -rs '[.[] | select(.State == "running")] | length')
          echo "Running services: $RUNNING"
          if [ "$RUNNING" -ne 3 ]; then
            echo "::error::Expected 3 running services (pinchy, openclaw, db), got $RUNNING"
            docker compose ps
            exit 1
          fi

      - name: Assert pinchy binds to 127.0.0.1 by default (not 0.0.0.0)
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # Docker bypasses UFW — only 127.0.0.1 binding prevents external access.
          # This assertion catches any regression that re-exposes port 7777 globally.
          BINDING=$(docker inspect \
            --format '{{range $p, $c := .NetworkSettings.Ports}}{{range $c}}{{.HostIp}}{{end}}{{end}}' \
            "$(docker compose ps -q pinchy)")
          echo "Pinchy port binding host IP: $BINDING"
          if [ "$BINDING" != "127.0.0.1" ]; then
            echo "::error::Pinchy must bind to 127.0.0.1 by default (got '$BINDING'). Docker bypasses UFW, so 0.0.0.0 exposes the port to the internet regardless of firewall rules."
            exit 1
          fi

      - name: Tear down
        if: always()
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose down -v

  release:
    name: Create GitHub Release
    # Skipped on workflow_dispatch: republishing images for an existing tag
    # must not re-create a release that already exists.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker, end-user-install-published]

    steps:
      - uses: actions/checkout@v7

      - name: Generate versioned cloud-init.yml
        run: sed "s/%%PINCHY_VERSION%%/${GITHUB_REF_NAME}/g" docs/src/snippets/cloud-init.yml > /tmp/cloud-init.yml

      - name: Extract upgrade notes for release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The new tag (this release) has been pushed but the GitHub Release
          # for it hasn't been created yet, so `gh release list --limit 1`
          # returns the *previous* release — the version users are upgrading from.
          TARGET="${GITHUB_REF_NAME#v}"
          PREV=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName -q '.[0].tagName // empty' | sed 's/^v//')
          if [ -z "$PREV" ]; then
            echo "No previous release found — skipping upgrade-notes extraction (first release)."
            : > /tmp/upgrade-notes.md
          else
            echo "Extracting upgrade notes for v${PREV} → v${TARGET}..."
            {
              echo "## Upgrade notes"
              echo ""
              node scripts/extract-upgrade-notes.mjs "$PREV" "$TARGET"
              echo ""
            } > /tmp/upgrade-notes.md
            echo "=== /tmp/upgrade-notes.md ==="
            cat /tmp/upgrade-notes.md
            echo "============================="
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # body_path content is pre-pended to the auto-generated notes.
          body_path: /tmp/upgrade-notes.md
          files: |
            docs/public/installing.html
            /tmp/cloud-init.yml

  docs:
    name: Capture Screenshots & Deploy Docs
    needs: release
    # Releases created by GITHUB_TOKEN don't fire `release: published`
    # events, so we call the screenshots workflow directly from here. It
    # generates fresh screenshots against the newly released build and
    # then deploys the docs site with those screenshots embedded — keeping
    # screenshots in lockstep with the released UI.
    uses: ./.github/workflows/screenshots.yml
    secrets: inherit
    permissions:
      contents: write
      pages: write
      id-token: write
