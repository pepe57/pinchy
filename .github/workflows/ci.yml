            sleep 2
          done
          echo "Waiting for mock Telegram..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9001/control/health >/dev/null 2>&1; then
              echo "Mock Telegram healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Mock Telegram not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs telegram-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - name: Run Telegram E2E tests
        run: pnpm -C packages/web test:e2e:telegram
        env:
          CI: true

      - name: Show logs on failure
        if: failure()
        run: |
          # Container state first — if a container has restarted or exited, the
          # log tails below tell a confusing story (truncated at the wrong end).
          # In run 25261606990 OpenClaw stopped emitting logs ~3 min before the
          # test 10 timeout: docker compose ps reveals whether that was a crash,
          # a restart loop, or just a quiet healthy process.
          echo "=== Container state ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml ps --all 2>&1 || true
          # Mock telegram is the primary diagnostic for the known flake:
          # we need to see every bot token that ever polled, not just the last
          # 30 lines. Each bot pings getUpdates every ≤30s, so a 7-test suite
          # easily logs hundreds of lines. tail -2000 covers a full run.
          echo "=== Mock Telegram health snapshot ==="
          curl -sf http://localhost:9001/control/health | jq . || echo "health endpoint unreachable"
          echo "=== Mock Telegram all bot responses ==="
          curl -sf 'http://localhost:9001/control/responses' | jq . || echo "responses endpoint unreachable"
          # Definitive answer to "what token does OpenClaw think is configured?":
          # the openclaw.json file Pinchy writes and OpenClaw reads. If this
          # disagrees with the DB-side telegram_bot_token settings (also dumped
          # below), the targeted-write race in updateTelegramChannelConfig is
          # the culprit. If they agree but mock polls a stale token, OpenClaw's
          # channel restart isn't picking up the file change.
          echo "=== Pinchy openclaw.json (from Pinchy container — same bind mount as OpenClaw) ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml exec -T pinchy cat /openclaw-config/openclaw.json 2>/dev/null | jq '{bindings, channels: .channels, sessionScope: .session.dmScope, agents: (.agents.list | length)}' || echo "openclaw.json not readable"
          echo "=== Pinchy DB telegram_bot_token settings ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml exec -T db psql -U pinchy -d pinchy -c "SELECT key, LEFT(value, 30) AS value_preview, encrypted FROM settings WHERE key LIKE 'telegram_%' ORDER BY key;" 2>/dev/null || echo "db not readable"
          echo "=== Mock Telegram logs (full) ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs telegram-mock 2>&1 | tail -2000
          # OpenClaw: 3000 because tail -500 only covered the initial setup
          # (~90s) and missed Test 10's failure window — see PR-CI run
          # 25260750434, where OpenClaw activity after 20:16:50 (Multi-Bot
          # connectBot) was truncated. We need the full restart trace post-
          # connect to confirm whether the second account's provider ever
          # starts.
          echo "=== OpenClaw logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs openclaw 2>&1 | tail -3000
          echo "=== Pinchy logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy 2>&1 | tail -500

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml down -v

  integration:
    name: Integration Tests (OpenClaw + Fake Ollama)
    runs-on: ubuntu-latest

    # Production-image CI test (Tier 3 of the dev/prod parity work, #196).
    # Pinchy is built from `Dockerfile.pinchy` (uid 999 demotion via
    # entrypoint.sh) inside the compose stack, like every other E2E suite,
    # so file-permission bugs between Pinchy (uid 999) and OpenClaw (root)
    # in pinchy-files / pinchy-context / pinchy-audit / pinchy-docs are
    # caught here instead of leaking to production.
    #
    # ${PINCHY_VERSION:?} on docker-compose.yml's `image:` line is satisfied
    # by any non-empty string; the build directive in docker-compose.e2e.yml
    # takes precedence and tags with that name.
    env:
      PINCHY_VERSION: latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # On Linux, host.docker.internal doesn't resolve outside containers by default.
      # globalSetup spawns fake Ollama on the host and probes it from inside the
      # OpenClaw container; the host-side reverse probe is unused, but we add this
      # entry defensively because some helpers fetch host URLs from the host too.
      - name: Add host.docker.internal to /etc/hosts
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Install Playwright Chromium
        run: pnpm -C packages/web exec playwright install chromium --with-deps

      - name: Start integration stack with production Pinchy image
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7779/api/internal/openclaw-config-ready >/dev/null 2>&1; then
              echo "Pinchy ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not ready after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - name: Run integration tests
        run: pnpm -C packages/web test:integration
        env:
          CI: true

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== Container state ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml ps --all 2>&1 || true
          echo "=== Pinchy logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs pinchy 2>&1 | tail -500
          echo "=== OpenClaw logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs openclaw 2>&1 | tail -1500
          echo "=== DB logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml logs db 2>&1 | tail -50

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml down -v 2>/dev/null || true

  ollama-integration:
    name: Ollama integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          # Wait for Ollama to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Ollama failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Pull test model
        run: ollama pull qwen2.5:0.5b

      - name: Run Ollama integration tests
        run: pnpm --filter @pinchy/web exec vitest run src/__tests__/integration/ollama-provider.test.ts
        env:
          OLLAMA_URL: http://localhost:11434

  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --max-retries 3 --retry-wait-time 5 '**/*.md' '**/*.mdx' --exclude-path node_modules --exclude-path .git --exclude-path docs --exclude 'localhost' --exclude 'linkedin\\.com' --exclude 'sonner\\.emilkowal\\.dev' --exclude 'squawkhq\\.com' --exclude 'contributor-covenant\\.org'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Vulnerability scan via osv-scanner — replaces the old `pnpm audit` step
  # that broke when npm retired the /security/audits/quick endpoint (returns
  # 410 unconditionally). osv-scanner reads pnpm-lock.yaml directly and
  # queries the OSV database, so we don't need an npm install and don't
  # depend on npm's legacy audit API.
  vuln-scan:
    name: Security audit
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5"
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --lockfile=./pnpm-lock.yaml
        --lockfile=./docs/pnpm-lock.yaml
    permissions:
      actions: read
      security-events: write
      contents: read

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for local paths in codebase
        run: |
          # Block local absolute paths that should never be committed
          PATTERNS='/Users/|C:\\Users\\|C:/Users/'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md' 2>/dev/null; then
            echo "::error::Local absolute paths found in codebase:"
            git grep -nEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md'
            exit 1
          fi
          echo "No local paths detected"

      - name: Check for secrets in codebase
        run: |
          # Check for common secret patterns in tracked files
          PATTERNS='(AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{20,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!*.test.*' ':!*.md' 2>/dev/null; then
            echo "::error::Potential secrets found in codebase"
            exit 1
          fi
          echo "No secrets detected"
