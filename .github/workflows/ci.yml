    # ${PINCHY_VERSION:?} on docker-compose.yml's `image:` line is satisfied
    # by any non-empty string; the build directive in docker-compose.e2e.yml
    # takes precedence when PINCHY_IMAGE is not set.
    env:
      PINCHY_VERSION: latest
      DB_PASSWORD: pinchy-ci-smoke-pass

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Build Pinchy and OpenClaw images locally (fork PR fallback)
        if: needs.build-image.result == 'skipped'
        run: |
          docker build -t pinchy:e2e -f Dockerfile.pinchy .
          docker build -t pinchy-openclaw:e2e -f Dockerfile.openclaw .

      # On Linux, host.docker.internal doesn't resolve outside containers by
      # default. globalSetup spawns fake Ollama on the host and probes it from
      # inside the OpenClaw container; this entry is a defensive fallback for
      # helpers that fetch host URLs from the host side too.
      - name: Add host.docker.internal to /etc/hosts
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Start integration stack (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: |
          docker compose -f docker-compose.yml \
                         -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml \
                         up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start integration stack (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: |
          docker compose -f docker-compose.yml \
                         -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml \
                         up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for Pinchy to be ready
        run: |
          echo "Waiting for Pinchy at localhost:7779..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7779/api/internal/openclaw-config-ready >/dev/null 2>&1; then
              echo "Pinchy ready (attempt $i)"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not ready after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                             -f docker-compose.integration.yml logs pinchy
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      - name: Run integration tests
        run: pnpm -C packages/web test:integration
        env:
          CI: true

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== OpenClaw logs (captured by globalTeardown before stack-down) ==="
          cat /tmp/openclaw-integration.log 2>/dev/null || echo "no captured log file"
          echo ""
          echo "=== Container state ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml ps --all 2>&1 || true
          echo "=== Pinchy logs ==="
          # 1500 lines: a per-tool dispatch generates ~5 lines (request +
          # broadcasts + complete), 16 tests in this suite x ~3 chats avg ≈
          # 240 chat-related lines, plus a healthy buffer for startup +
          # restart + memory-audit-watcher chatter. 500 was eating Test 7's
          # window before Test 12's failure could be triaged (PR #442 CI runs
          # 26506915089 + 26510486357 — both Domain Lock failures with
          # truncated logs).
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs pinchy 2>&1 | tail -1500
          echo "=== OpenClaw logs (live) ==="
          # 5000 lines: every chat dispatch generates a multi-line
          # `[agent/embedded] [trace:embedded-run] core-plugin-tool stages: ...`
          # entry (~1KB single-line trace) plus the `[ws] ⇄ res ✓ agent` line
          # plus stream chunks. 1500 lines covered ~4-5 chats; the integration
          # suite runs 16 tests with multiple chats each. Bumped after the
          # PR #442 Domain Lock investigation — only the FIRST test's agent
          # RPC was visible in the prior tail window, hiding evidence of
          # what test 12 actually dispatched to OC.
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs openclaw 2>&1 | tail -5000
          echo "=== DB logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs db 2>&1 | tail -50

      - name: Capture full diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml"
          # Integration suite runs fake-Ollama on the host, not as a compose
          # service — no mock to capture, the globalTeardown-captured
          # /tmp/openclaw-integration.log is already shown above.
          artifact-name: "integration"

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml down -v 2>/dev/null || true

  ollama-integration:
    name: Ollama integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Install Ollama
        # Retry the whole install: ollama's installer downloads a binary from a
        # CDN that intermittently returns a transient 504, which then feeds a
        # partial body into zstd/tar and fails the step — not a real error.
        run: |
          for attempt in 1 2 3; do
            if curl -fsSL https://ollama.com/install.sh | sh; then exit 0; fi
            echo "Ollama install attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Ollama install failed after 3 attempts"
          exit 1

      - name: Start Ollama
        run: |
          ollama serve &
          # Wait for Ollama to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Ollama failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Pull test model
        run: ollama pull qwen2.5:0.5b

      - name: Run Ollama integration tests
        run: pnpm --filter @pinchy/web exec vitest run src/__tests__/integration/ollama-provider.test.ts
        env:
          OLLAMA_URL: http://localhost:11434

  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --accept treats transient server responses (rate-limit + 5xx, e.g.
          # GitHub returning a 504 during a brief outage) as OK so they don't
          # red-light unrelated PRs. Genuinely broken links (404/410) still fail.
          # github.com/heypinchy/website is excluded because it's a SEPARATE
          # PRIVATE repo: the job's GITHUB_TOKEN is scoped to this repo only, so
          # lychee gets a 404 even though the link is valid for maintainers. The
          # release docs intentionally cross-reference it.
          args: "--no-progress --max-retries 3 --retry-wait-time 5 --accept '200..=299,429,500..=599' '**/*.md' '**/*.mdx' --exclude-path node_modules --exclude-path .git --exclude-path docs --exclude 'localhost' --exclude 'github\\.com/heypinchy/website' --exclude 'linkedin\\.com' --exclude 'sonner\\.emilkowal\\.dev' --exclude 'squawkhq\\.com' --exclude 'contributor-covenant\\.org' --exclude 'star-history\\.com'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Vulnerability scan via osv-scanner — replaces the old `pnpm audit` step
  # that broke when npm retired the /security/audits/quick endpoint (returns
  # 410 unconditionally). osv-scanner reads pnpm-lock.yaml directly and
  # queries the OSV database, so we don't need an npm install and don't
  # depend on npm's legacy audit API.
  vuln-scan:
    name: Security audit
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --lockfile=./pnpm-lock.yaml
        --lockfile=./docs/pnpm-lock.yaml
    permissions:
      actions: read
      security-events: write
      contents: read

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check for local paths in codebase
        run: |
          # Block local absolute paths that should never be committed
          PATTERNS='/Users/|C:\\Users\\|C:/Users/'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md' 2>/dev/null; then
            echo "::error::Local absolute paths found in codebase:"
            git grep -nEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md'
            exit 1
          fi
          echo "No local paths detected"

      - name: Check for secrets in codebase
        run: |
          # Check for common secret patterns in tracked files
          PATTERNS='(AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{20,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!*.test.*' ':!*.md' 2>/dev/null; then
            echo "::error::Potential secrets found in codebase"
            exit 1
          fi
          echo "No secrets detected"
