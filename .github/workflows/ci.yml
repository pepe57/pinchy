name: CI

# NOTE: deliberately NO `paths-ignore:` here. This workflow hosts main's
# required status checks, and a workflow that never starts never reports a
# status — so a docs-only PR would sit forever on "Expected — Waiting for status
# to be reported", unmergeable with nothing actually broken. The same path
# filter now lives at the JOB level: the `changes` job below works out whether
# real code changed, and every expensive job is gated on it. The required checks
# themselves are never gated, so they always report.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge queue. GitHub tests each queued PR on a `gh-readonly-queue/main/...`
  # merge ref (main + the PR, and speculatively + the entries ahead of it), so
  # the required checks run against the exact post-merge state. This is what lets
  # us drop "Require branches to be up to date" from branch protection: the queue
  # provides the same freshness guarantee without every PR author hand-rebasing
  # and burning a full CI run each time. Without this trigger the workflow never
  # starts for a queued PR and the required checks never report — the queue would
  # hang forever. The `changes` job below deliberately answers code=false for
  # merge_group, so only the required checks (which are ungated) run on the merge
  # ref; the heavy Docker/E2E matrix already ran on the PR and, being non-required,
  # would not gate the queue anyway — it still runs post-merge on the main push.
  merge_group:
  # Manual trigger: lets a maintainer re-run the full CI (incl. osv-scan) on a
  # ref on demand — e.g. to clear a stale red main after a docs-lockfile
  # security bump (osv-scan reads docs/pnpm-lock.yaml), which the `changes`
  # gate classifies as docs-only.
  workflow_dispatch:

# Cancel in-progress runs on the same PR/branch when a new commit is pushed.
# For main, never cancel — release/post-merge runs must always complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Replaces the workflow-level `paths-ignore` this file used to carry (see the
  # note above `on:`). Every expensive job gates on `code`; the required checks
  # (quality, vitest-integration, e2e) deliberately do NOT, so they report on
  # every PR instead of relying on GitHub's "a skipped job counts as success"
  # behaviour for the one thing protecting main.
  #
  # Decision logic + the drift guards keeping this wiring honest live in
  # scripts/lib/ci-path-filter.mjs and its test (run by `pnpm test:scripts`).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Enough history for a merge-base against the target branch. The
          # filter falls back to "run everything" if a base can't be resolved,
          # so a too-shallow clone costs CI minutes, never coverage.
          fetch-depth: 0

      - id: filter
        # Every github.* value reaches the script through env, never through
        # `${{ }}` interpolation into the shell — event_name is a closed enum and
        # harmless, but a half-interpolated script invites the next edit to add a
        # branch name or PR title, which are attacker-controlled.
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "merge_group" ]; then
            # In the merge queue, only the required checks (quality,
            # vitest-integration, e2e) need to run on the merge ref — they are
            # ungated and run regardless of this output. The heavy Docker/E2E
            # matrix is gated on code, and we skip it here on purpose: it already
            # ran on the PR, and being non-required it would not gate the queue
            # anyway, so re-running it (×5 with speculative entries) would only
            # burn minutes and slow the queue. It still runs post-merge on the
            # main push. Hence code=false — "the gated matrix need not run".
            echo "Merge queue — required checks only, skipping the gated matrix."
            echo "code=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="origin/$BASE_REF"
          elif [ "$EVENT_NAME" = "push" ]; then
            BASE="$BEFORE"
          else
            # workflow_dispatch: an explicit manual run always means "run it all".
            echo "Manual run — full matrix."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # An unresolvable base (first push to a branch, force push, grafted
          # history) yields an empty diff, which the filter reads as "unknown"
          # and answers with the full matrix.
          if ! git rev-parse --verify --quiet "$BASE^{commit}" >/dev/null; then
            echo "Base '$BASE' not resolvable — full matrix."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BASE...HEAD" | node scripts/detect-code-changes.mjs

  # The two images are built by a MATRIX (one runner each), not as two steps of
  # one job. They are genuinely independent — both start `FROM
  # mirror.gcr.io/library/node:22-slim` and neither `COPY --from`s the other —
  # and building them serially put their two ~10 min builds end-to-end on the
  # critical path of all 12 downstream Docker/E2E jobs (measured: 20m06 on a
  # cold cache, run 29559529435). Two runners build them in true parallel, which
  # halves that. `docker buildx bake` in a single job would NOT: both targets
  # would then contend for one runner's cores.
  #
  # This job deliberately has no `outputs`. A matrix job cannot express
  # per-entry outputs, and it doesn't need to: the image tags are a pure
  # function of github.sha, so the `build-image` fan-in below recomputes them.
  build-images:
    name: Build ${{ matrix.name }} image
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Skip on fork PRs: GITHUB_TOKEN is read-only for forks and cannot push
    # to GHCR. Non-PR pushes (main) and same-repo PRs always run.
    # Downstream jobs fall back to per-job local build when this is skipped.
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    strategy:
      # Report both failures, not just the first: a broken Dockerfile.pinchy
      # shouldn't hide an independent break in Dockerfile.openclaw.
      fail-fast: false
      matrix:
        include:
          - name: Pinchy
            file: Dockerfile.pinchy
            tag: ghcr.io/heypinchy/pinchy-ci
            scope: pinchy
          - name: OpenClaw
            file: Dockerfile.openclaw
            tag: ghcr.io/heypinchy/pinchy-openclaw-ci
            scope: openclaw
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ matrix.tag }}:sha-${{ github.sha }}
          # Read main's cache; write it only FROM main. The previous per-branch
          # `scope=<img>-${{ github.ref_name }}` wrote a full mode=max layer set
          # per branch, and type=gha shares ONE 10 GB per-repo budget — so two
          # images × every active branch evicted each other constantly. That is
          # the measured 3× spread: 6m27 warm vs 20m06 cold on the same
          # Dockerfiles. Two stable scopes stay far under the cap, so a PR now
          # reliably starts warm from main.
          #
          # The trade: a PR's 2nd push no longer reuses its own 1st push's
          # layers. That's near-free — it would rebuild the changed layers
          # anyway — and it also skips the ~30-60 s cache EXPORT on every PR
          # build. If two mode=max scopes ever exceed 10 GB, move to
          # `type=registry` on GHCR (no cap) rather than reintroducing
          # per-branch scopes.
          cache-from: type=gha,scope=${{ matrix.scope }}-main
          cache-to: ${{ github.ref_name == 'main' && format('type=gha,mode=max,scope={0}-main', matrix.scope) || '' }}

  # Fan-in. Exists so the 12 downstream jobs keep depending on ONE job with the
  # exact contract they already encode — `needs.build-image.result` plus
  # `.outputs.{pinchy,openclaw}-image` — instead of every one of them growing a
  # two-job `needs:` and a doubled result check. Its `if:` mirrors build-images'
  # verbatim, which is what preserves the three downstream states:
  #
  #   built      → both matrix entries succeeded → this succeeds → jobs pull.
  #   skipped    → fork PR / docs-only → condition false → this is `skipped`
  #                → jobs take their local-build fallback, as before.
  #   failed     → `always()` still runs this, the guard step below fails it
  #                → downstream `if:` is false → jobs are skipped, as before.
  #
  # Without `always()` a failed build would leave this `skipped`, and every
  # downstream job would silently local-build a Dockerfile CI just proved broken.
  build-image:
    name: Build Pinchy + OpenClaw images
    needs: [changes, build-images]
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
    runs-on: ubuntu-latest
    outputs:
      pinchy-image: ${{ steps.tags.outputs.pinchy }}
      openclaw-image: ${{ steps.tags.outputs.openclaw }}
    steps:
      # A matrix `result` is aggregated: 'success' only when EVERY entry
      # succeeded. Anything else must fail this job, not be waved through.
      - name: Fail if either image build failed
        if: needs.build-images.result != 'success'
        run: |
          echo "::error::image build did not succeed (build-images result: ${{ needs.build-images.result }})"
          exit 1

      # Recomputed, not passed through — a matrix job cannot express per-entry
      # outputs. That leaves two copies of the same expression, so
      # scripts/lib/ci-image-tags.test.mjs (`pnpm test:scripts`) pins them
      # together: without it, a tag edited on one side only would have every
      # downstream job pull an image nobody pushed.
      - id: tags
        run: |
          echo "pinchy=ghcr.io/heypinchy/pinchy-ci:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "openclaw=ghcr.io/heypinchy/pinchy-openclaw-ci:sha-${{ github.sha }}" >> $GITHUB_OUTPUT

  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Lint
        run: pnpm --filter @pinchy/web lint

      - name: Format check (web)
        run: pnpm --filter @pinchy/web format:check

      # Docs & workflow formatting is checked by the dedicated `docs-format.yml`
      # workflow, which (unlike this one) is NOT paths-ignored for docs, so it
      # runs on the docs PRs it guards instead of only firing as collateral
      # here on unrelated code changes.

      - name: Typecheck plugins
        # The pinchy-* plugins run via tsx with no ahead-of-time type checking
        # elsewhere (root `pnpm build` is `next build`, which only typechecks
        # packages/web; Dockerfile.openclaw only installs plugin deps). This runs
        # `tsc --noEmit` against each plugin's own tsconfig, covering production
        # AND test files. The drift guard in scripts/lib/plugin-typecheck.test.mjs
        # (run by `pnpm test:scripts`) keeps every plugin wired for this gate.
        run: pnpm typecheck:plugins

      - name: Typecheck web (incl. tests)
        # `next build` (the Build step) type-checks packages/web, but its
        # tsconfig EXCLUDES *.test.ts(x) — so test files, and the dormant
        # expectTypeOf/assertType assertions inside them, were never
        # type-checked anywhere in CI. This runs `tsc --noEmit` over
        # tsconfig.typecheck.json, which INCLUDES the test files, closing that
        # gap. The drift guard (scripts/lib/web-typecheck-gate.test.mjs, run by
        # `pnpm test:scripts`) keeps the tsconfig/script/CI wiring in place.
        run: pnpm -C packages/web typecheck

      - name: Smoke-load plugins (production deps only)
        # Runtime complement to typecheck:plugins: tsc sees devDependencies'
        # type declarations, so a dependency that's missing from a plugin's
        # *runtime* install (should be `dependencies`, was left in
        # `devDependencies`) typechecks fine but throws when OpenClaw actually
        # loads the plugin — silently dropping every tool it registers, with
        # no error surfaced anywhere (the incident behind this gate: a missing
        # `googleapis` took out all 6 pinchy-email tools). This installs each
        # plugin's deps with `--omit=dev` in isolation (mirroring
        # Dockerfile.openclaw), loads it via tsx, and asserts it registers
        # exactly the tools declared in openclaw.plugin.json#contracts.tools.
        run: pnpm smoke-load:plugins

      - name: Docs lint (no indented tables)
        run: cd docs && pnpm install --frozen-lockfile && pnpm check:tables

      - name: Docs build
        run: cd docs && pnpm build

      - name: Squawk migration lint (changed files only)
        if: github.event_name == 'pull_request'
        run: |
          # Default checkout is shallow (depth 1); fetch base ref so git diff
          # has a comparison target. Filtering to changed migration files only
          # keeps historical destructive DDL (pre-Scope-3) untouched.
          # Pinned version: when bumping, re-verify rule names in .squawk.toml.
          git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD -- 'packages/web/drizzle/*.sql' | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then
            echo "No migration changes — skipping Squawk lint"
            exit 0
          fi
          echo "Linting changed migrations: $CHANGED"
          # shellcheck disable=SC2086 -- word-split intentional: passes each migration path as a separate squawk arg
          npx --yes squawk-cli@2.48.0 $CHANGED

      - name: Test removal guard (no untracked test deletions)
        if: github.event_name == 'pull_request'
        env:
          # The `allow-test-deletion` PR label is the deliberate, visible override.
          ALLOW_TEST_DELETION: ${{ contains(github.event.pull_request.labels.*.name, 'allow-test-deletion') }}
          # The PR head sha lets the guard read override trailers from the PR's
          # OWN (ungrafted) history. actions/checkout leaves HEAD as a shallow
          # merge commit whose feature-side parent is a graft, so `git log HEAD`
          # can't see the trailer commit — the diff still counts removals, so an
          # authorized PR would fail. Reading the head sha's history is robust.
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Fail if the PR removes test cases on net — deleted test files or
          # removed it()/test() blocks — without an explicit, tracked override.
          # Closes the gap left by no-untracked-skips (which only catches
          # .skip/.todo). See AGENTS.md § "No Untracked Test Removal".
          #
          # Fetch base + deepen HEAD so a merge-base resolves (correct PR-diff
          # semantics). The guard falls back to a tip-to-tip diff if it can't,
          # so a shallow clone never crashes it. Also fetch the PR head sha so
          # its ungrafted history is present for the trailer lookup above.
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}"
          git fetch --no-tags --deepen=200 origin || true
          git fetch --no-tags --depth=200 origin "$PR_HEAD_SHA" || true
          node scripts/check-test-deletions.mjs --base "origin/${{ github.base_ref }}"

      - name: Drizzle snapshot integrity
        # Catches the PR #334 class of bug: a committed migration .sql whose
        # _snapshot.json is missing from drizzle/meta/, silently breaking the
        # snapshot chain. Same script runs in the pre-commit hook locally.
        run: node scripts/check-drizzle-snapshots.mjs

      - name: Drizzle schema drift check
        # Catches the inverse: schema.ts diverged from the latest snapshot
        # without a corresponding migration. `drizzle-kit generate` is a no-op
        # when in sync; any new files mean someone changed schema.ts and
        # forgot to commit the migration drizzle would generate.
        run: |
          pnpm -C packages/web exec drizzle-kit generate
          if ! git diff --exit-code -- packages/web/drizzle/; then
            echo "❌ schema.ts has uncommitted changes that drizzle-kit would generate a migration for."
            echo "   Run \`pnpm -C packages/web db:generate\` locally and commit the result."
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Test (root scripts)
        run: pnpm test:scripts

      - name: Test (plugins)
        # The plugin test FILES already run inside `pnpm test` via the
        # `../plugins/pinchy-*` include in packages/web/vitest.config.ts —
        # but under the web package's config (jsdom, web setup files, web
        # node_modules). This step additionally runs each plugin package's
        # own `test` script under its own config and dependencies, exactly
        # as plugin developers run it locally, catching phantom-dependency
        # and environment drift the web-config run would mask.
        # `--fail-if-no-match` keeps the step from going vacuously green if
        # the workspace glob ever stops matching.
        run: pnpm test:plugins

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            packages/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/web/**/*.[jt]s', 'packages/web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build

  license-keypair:
    name: Verify License Keypair
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify private key matches public key
        env:
          PINCHY_LICENSE_PRIVATE_KEY: ${{ secrets.PINCHY_LICENSE_PRIVATE_KEY }}
        run: |
          npm install jose
          node -e "
            const jose = require('jose');
            const fs = require('fs');
            const src = fs.readFileSync('packages/web/src/lib/enterprise.ts', 'utf8');
            const pubMatch = src.match(/-----BEGIN PUBLIC KEY-----[\s\S]+?-----END PUBLIC KEY-----/);
            if (!pubMatch) { console.error('❌ Public key not found in enterprise.ts'); process.exit(1); }
            (async () => {
              const priv = await jose.importPKCS8(process.env.PINCHY_LICENSE_PRIVATE_KEY, 'ES256');
              const pub = await jose.importSPKI(pubMatch[0], 'ES256');
              const jwt = await new jose.SignJWT({test: true}).setProtectedHeader({alg: 'ES256'}).sign(priv);
              await jose.jwtVerify(jwt, pub);
              console.log('✅ Keypair verified: private key matches public key in enterprise.ts');
            })();
          "

  vitest-integration:
    name: Vitest Integration Tests (real DB)
    runs-on: ubuntu-latest

    # Real-DB unit-style tests (#229). Distinct from `e2e` (full Playwright
    # browser stack) and `integration` (OpenClaw + fake Ollama via
    # docker-compose.integration.yml). Just Postgres + Drizzle migrations +
    # the route handlers under test.
    services:
      postgres:
        # Pulled from mirror.gcr.io to bypass docker.io's rate limit (same
        # pattern as the e2e job above). Pinned to the same
        # pgvector/pgvector:pg17-trixie tag as docker-compose.yml's `db`
        # service (see its comment for why `-trixie` specifically); drift
        # would risk masking version-specific bugs (parser, planner,
        # locking) or, since 0049_enable_pgvector.sql, failing outright on
        # `CREATE EXTENSION vector`.
        image: mirror.gcr.io/pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_DB: pinchy
          POSTGRES_USER: pinchy
          POSTGRES_PASSWORD: pinchy_dev
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Run vitest integration tests
        run: pnpm -C packages/web test:db
        env:
          VITEST_INTEGRATION_DB_URL: postgresql://pinchy:pinchy_dev@localhost:5436/pinchy_test_vitest

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        # Pull from mirror.gcr.io (Google's public Docker Hub mirror) instead of
        # docker.io to bypass the 200/6h auth rate limit. Service containers are
        # started by the GitHub Actions runner BEFORE any user step runs, so the
        # docker-mirror composite action can't help here — the only way to
        # avoid docker.io is to point the image reference at the mirror
        # directly. mirror.gcr.io is anonymous, so no credentials are needed.
        #
        # Pinned to the same pgvector/pgvector:pg17-trixie tag as
        # docker-compose.yml's `db` service (see its comment for why
        # `-trixie` specifically). Drift between CI's test DB and
        # production's DB risks masking version-specific bugs (different
        # parser, planner, locking) or failing outright on the
        # `CREATE EXTENSION vector` migration (0049_enable_pgvector.sql).
        image: mirror.gcr.io/pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_DB: pinchy
          POSTGRES_USER: pinchy
          POSTGRES_PASSWORD: pinchy_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - uses: ./.github/actions/setup-playwright

      - name: Run E2E tests
        run: pnpm -C packages/web test:e2e
        env:
          CI: true

  docker-smoke:
    name: Docker smoke test
    needs: [changes, build-image]
    # Run even when build-image is skipped: on fork PRs that's by design and we
    # fall back to a local build below. But build-image is ALSO skipped on a
    # docs-only PR — where we must not build anything at all — so the changes
    # gate has to be explicit rather than inferred from build-image's result.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Dev-mode CI test: images are built locally and tagged :latest. Satisfy
    # the compose fail-loud check on ${PINCHY_VERSION:?} without depending on
    # a .env file. Deliberately NO DB_PASSWORD: this stack exercises the
    # entrypoint's password auto-migration (#156) like a real install that
    # never set one — asserted below via /api/health secrets provenance.
    env:
      PINCHY_VERSION: latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Tag pulled images as :latest for compose
        if: needs.build-image.result == 'success'
        run: |
          docker tag ${{ needs.build-image.outputs.pinchy-image }} ghcr.io/heypinchy/pinchy:latest
          docker tag ${{ needs.build-image.outputs.openclaw-image }} ghcr.io/heypinchy/pinchy-openclaw:latest

      - name: Build production images locally (fork PR fallback)
        if: needs.build-image.result == 'skipped'
        run: |
          docker build -t ghcr.io/heypinchy/pinchy:latest -f Dockerfile.pinchy .
          docker build -t ghcr.io/heypinchy/pinchy-openclaw:latest -f Dockerfile.openclaw .

      - name: Verify end-user install assets are self-contained in the image
        run: |
          # End-users deploy by curl-ing docker-compose.yml into /opt/pinchy/
          # — no git clone, no source tree. Any relative bind-mount to repo
          # paths silently resolves to an empty directory in that scenario,
          # and Pinchy boots with (e.g.) an empty /pinchy-docs that Smithers
          # can't read from. This check runs the image in isolation,
          # bypassing compose and its bind-mounts, to prove the image ships
          # everything it needs at runtime.
          DOC_COUNT=$(docker run --rm --entrypoint sh ghcr.io/heypinchy/pinchy-openclaw:latest -c 'find /pinchy-docs -name "*.mdx" 2>/dev/null | wc -l')
          echo "Docs baked into openclaw image: $DOC_COUNT .mdx files"
          if [ "$DOC_COUNT" -lt 10 ]; then
            echo "::error::/pinchy-docs is missing or empty in the openclaw image ($DOC_COUNT .mdx files found). The docker-compose.yml must not rely on relative bind-mounts to source paths — they break in clean end-user installs."
            exit 1
          fi

      - name: Verify memory-search embedding wiring (offline, no API key)
        run: |
          # Guarantee the full local-embedding chain works in the shipped image:
          # the llama-cpp provider loads from plugins.allow, the bundled
          # EmbeddingGemma GGUF is present, boot-staging + registry refresh make
          # it discoverable, `openclaw memory index` builds the vector index, and
          # memory_search semantically recalls a stored fact. `--network none`
          # means a regression that needs a remote model or API key (e.g. a
          # revert to memory-core's `openai` default) fails LOUD here instead of
          # silently returning 0 chunks in production. Script + model path are
          # pinned to build.ts by the memory-embedding-pin-drift unit test.
          docker run --rm --network none \
            -v "$PWD/config/verify-memory-search.sh:/verify-memory-search.sh:ro" \
            --entrypoint bash \
            ghcr.io/heypinchy/pinchy-openclaw:latest /verify-memory-search.sh

      - name: Start production stack
        run: docker compose up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health (production)
        run: |
          # Poll the openclaw-config-ready endpoint (not /api/health) so we
          # wait until bootInits() has completed. /api/health returns 200 as
          # soon as the HTTP server starts — before migrations and
          # markOpenClawConfigReady() run — which would let "Verify
          # infrastructure ready" start before OpenClaw has been allowed to
          # start (it depends on the Docker healthcheck, which polls this
          # same endpoint). The 60×2s=120s window matches the Docker
          # healthcheck's own timeout (start_period 5s + retries 30 × 2s).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/internal/openclaw-config-ready; then
              echo "Production stack ready (bootInits complete)"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            # Show container status on first and every 5th attempt
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose ps
              docker compose logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "Production health check failed"
          docker compose ps
          docker compose logs pinchy
          exit 1

      - name: Verify infrastructure ready (production)
        run: |
          for i in $(seq 1 15); do
            BODY=$(curl -sf http://localhost:7777/api/setup/status 2>/dev/null || echo '{}')
            DB=$(echo "$BODY" | jq -r '.infrastructure.database // "unknown"')
            OC=$(echo "$BODY" | jq -r '.infrastructure.openclaw // "unknown"')
            if [ "$DB" = "connected" ] && [ "$OC" = "connected" ]; then
              echo "Infrastructure ready (database=$DB, openclaw=$OC)"
              exit 0
            fi
            echo "Attempt $i: database=$DB, openclaw=$OC"
            sleep 2
          done
          echo "::error::Infrastructure not ready: database=$DB, openclaw=$OC"
          docker compose logs pinchy openclaw
          exit 1

      - name: Verify DB password auto-migration (#156)
        run: |
          # The stack booted without DB_PASSWORD, so the entrypoint must have
          # migrated the database off the public default and persisted the
          # generated credential in the secrets volume.
          PROV=$(curl -sf http://localhost:7777/api/health | jq -r '.secrets.db_password')
          if [ "$PROV" != "generated" ]; then
            echo "::error::expected secrets.db_password=generated after auto-migration, got: $PROV"
            docker compose logs pinchy | grep -i -E "(db-password|password)" || true
            exit 1
          fi
          docker compose logs pinchy | grep -q "Database is using a managed (non-default) password" || {
            echo "::error::entrypoint migration log line missing"
            docker compose logs pinchy | head -40
            exit 1
          }
          echo "DB password auto-migration verified (provenance: generated)"

      - name: Run setup wizard (production)
        run: |
          STATUS=$(curl -s -o /tmp/setup-response.json -w "%{http_code}" \
            -X POST http://localhost:7777/api/setup \
            -H "Content-Type: application/json" \
            -H "Origin: http://localhost:7777" \
            -d '{"name":"CI Admin","email":"ci@test.local","password":"CiTestPass123!"}')
          echo "Setup response (HTTP $STATUS):"
          cat /tmp/setup-response.json
          if [ "$STATUS" -ne 201 ]; then
            echo "Setup failed with status $STATUS"
            docker compose logs pinchy
            exit 1
          fi
          echo "Setup completed successfully"

      - name: Verify OpenClaw connection (production)
        run: |
          # Setup wizard rewrites openclaw.json (adds Smithers, plus the
          # anthropic plugin OpenClaw auto-enables for Smithers' default model),
          # which OpenClaw treats as a plugins-changed reload → SIGUSR1 → full
          # process restart. Pinchy's openclaw-node uses exponential backoff on
          # reconnect (1s → 2s → 4s → … → 30s cap), so it can take ~60s for
          # Pinchy to land back on a healthy gateway after that restart cascade.
          # 120s (60 × 2s) gives headroom without masking real failures.
          echo "Waiting for OpenClaw connection after setup..."
          for i in $(seq 1 60); do
            if docker compose logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connection verified (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw Gateway"
              docker compose logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done
          LOGS=$(docker compose logs pinchy openclaw 2>&1)
          if echo "$LOGS" | grep -q "blocked plugin candidate"; then
            echo "::error::OpenClaw blocked one or more plugins (ownership issue)"
            echo "$LOGS" | grep "blocked plugin candidate"
            docker compose logs pinchy openclaw
            exit 1
          fi

      - name: Verify OpenClaw config writable by Pinchy
        run: |
          # OpenClaw creates openclaw.json with root-only permissions (600).
          # Pinchy runs as non-root and needs write access for provider/agent config.
          # start-openclaw.sh chmods the file to 666 via a 50ms background tick
          # after each OpenClaw startup, including the SIGUSR1-driven internal
          # restarts triggered when setup writes the Smithers config.
          #
          # The state we're asserting is "eventually 666" — OpenClaw can write
          # 600 again at any moment of an internal reload. Poll for up to 10s
          # to ride out any restart-then-chmod cycle before declaring failure.
          ATTEMPTS=20
          PERMS="000"
          for i in $(seq 1 $ATTEMPTS); do
            PERMS=$(docker compose exec -T pinchy stat -c '%a' /openclaw-config/openclaw.json 2>/dev/null || echo "000")
            if [ "$PERMS" = "666" ]; then
              echo "Config file permissions verified ($PERMS, attempt $i)"
              exit 0
            fi
            sleep 0.5
          done
          echo "::error::openclaw.json has permissions $PERMS (expected 666 after $ATTEMPTS attempts). Pinchy cannot write config."
          docker compose exec -T openclaw ls -la /root/.openclaw/openclaw.json
          exit 1

      - name: Verify clean startup (production)
        run: |
          LOGS=$(docker compose logs 2>&1)
          # OpenClaw may restart once after setup (config regeneration), but not more
          RESTART_COUNT=$(echo "$LOGS" | grep -c "Restarting OpenClaw Gateway" || true)
          if [ "$RESTART_COUNT" -gt 1 ]; then
            echo "::error::OpenClaw restarted $RESTART_COUNT time(s) during startup (expected at most 1)"
            docker compose logs openclaw
            exit 1
          fi
          # Pinchy should not spam connection errors
          ERROR_COUNT=$(echo "$LOGS" | grep -c "OpenClaw client error" || true)
          if [ "$ERROR_COUNT" -gt 1 ]; then
            echo "::warning::Pinchy logged $ERROR_COUNT OpenClaw connection errors (expected at most 1)"
          fi
          echo "Clean startup verified (restarts=$RESTART_COUNT, connection_errors=$ERROR_COUNT)"

      - name: Verify plugins load + deps survive a pinchy-only restart (PR #275 regression)
        run: |
          # External-dep plugins' node_modules are installed ONLY by the
          # OpenClaw container (start-openclaw.sh) from baked /opt/<plugin>-deps
          # bundles — the pinchy image ships plugin SOURCE with no node_modules.
          # PR #275 made pinchy's per-boot source sync `rm -rf; cp -r`, which
          # wiped those deps on every pinchy restart, so a pinchy-only recreate
          # (openclaw left running) broke pinchy-web / pinchy-files /
          # pinchy-odoo with "Cannot find module". A fresh full-stack boot
          # happens to order correctly, which is why CI never caught it. This
          # reproduces the partial restart and asserts the deps survive.
          set -e
          DEP_PLUGINS="pinchy-web pinchy-files pinchy-odoo pinchy-email"

          echo "== assert no plugin failed to load on initial boot =="
          if docker compose logs openclaw 2>&1 | grep -E "failed to (load|initialize)|Cannot find module"; then
            echo "::error::a Pinchy plugin failed to load (missing runtime dep in the openclaw image?)"
            docker compose logs openclaw | tail -80
            exit 1
          fi

          assert_deps() {
            for p in $DEP_PLUGINS; do
              # Only plugins the openclaw image bundled deps for must have node_modules.
              if docker compose exec -T openclaw sh -c "test -d /opt/$p-deps"; then
                if ! docker compose exec -T openclaw sh -c "test -d /root/.openclaw/extensions/$p/node_modules"; then
                  echo "::error::$p/node_modules missing $1 — the plugin source sync wiped OpenClaw-installed deps"
                  exit 1
                fi
              fi
            done
            echo "all bundled-plugin node_modules present $1"
          }
          assert_deps "(initial boot)"

          echo "== pinchy-only recreate: re-runs the source sync, openclaw left running =="
          docker compose up -d --no-deps --force-recreate pinchy
          for i in $(seq 1 30); do
            curl -sf http://localhost:7777/api/health >/dev/null 2>&1 && break
            if [ "$i" -eq 30 ]; then
              echo "::error::pinchy did not become healthy after recreate"
              docker compose logs pinchy | tail -40
              exit 1
            fi
            sleep 2
          done
          assert_deps "(after pinchy-only recreate)"
          echo "Plugin deps survived a pinchy-only restart"

      # Regression guard for the openclaw-node deviceToken bug that broke the
      # v0.4.1 demo. Pinchy had been running fine; an upgrade recreated both
      # containers, gateway.auth.token got regenerated (race between Pinchy's
      # regenerateOpenClawConfig and OpenClaw's ensure-gateway-token), and
      # Pinchy could no longer authenticate because the old openclaw-node
      # kept sending the bootstrap token instead of the per-device token
      # issued at pairing. We force that rotation deterministically here by
      # stripping gateway.auth.token from the persisted openclaw.json before
      # the restart — OpenClaw will mint a fresh token on the way back up.
      # Volumes are preserved, so paired.json (with the per-device token)
      # survives — exactly the scenario that broke on demo.
      - name: Force gateway.auth.token rotation + container recreate (regression guard)
        run: |
          echo "=== Stripping gateway.auth.token to force rotation on next start ==="
          docker compose exec -T openclaw node -e '
            const fs = require("fs");
            const p = "/root/.openclaw/openclaw.json";
            const c = JSON.parse(fs.readFileSync(p, "utf8"));
            const before = c.gateway?.auth?.token?.slice(0,12) ?? "<none>";
            if (c.gateway?.auth) delete c.gateway.auth.token;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
            console.log("stripped auth.token; was:", before);
          '
          echo "=== Stopping stack (volumes preserved) ==="
          docker compose down
          echo "=== Starting stack again ==="
          docker compose up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health after recreate
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/internal/openclaw-config-ready; then
              echo "Stack ready after recreate (bootInits complete)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health check failed after container recreate"
          docker compose ps
          docker compose logs
          exit 1

      - name: Verify generated DB password survives recreate (#156)
        run: |
          PROV=$(curl -sf http://localhost:7777/api/health | jq -r '.secrets.db_password')
          if [ "$PROV" != "generated" ]; then
            echo "::error::secrets.db_password should still be 'generated' after recreate, got: $PROV"
            docker compose logs pinchy | grep -i "db-password" || true
            exit 1
          fi
          echo "Generated DB password survived the recreate (steady state)"

      - name: Verify Pinchy reconnects to OpenClaw after recreate
        run: |
          # Watch the fresh logs (since this container start) for a successful
          # connect. Any token_mismatch / token_missing means auth is broken.
          for i in $(seq 1 60); do
            RECENT=$(docker compose logs pinchy --since 120s 2>&1)
            if echo "$RECENT" | grep -q "Connected to OpenClaw Gateway"; then
              echo "Pinchy reconnected to OpenClaw (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy did not reconnect to OpenClaw within 120s after recreate"
              echo "--- pinchy logs ---"
              docker compose logs pinchy | tail -40
              echo "--- openclaw logs ---"
              docker compose logs openclaw | tail -40
              exit 1
            fi
            sleep 2
          done
          # OpenClaw side must show no auth failures in this window.
          OC_RECENT=$(docker compose logs openclaw --since 120s 2>&1)
          if echo "$OC_RECENT" | grep -qE "reason=(token_mismatch|token_missing)"; then
            echo "::error::OpenClaw rejected Pinchy's auth after recreate"
            echo "$OC_RECENT" | grep -E "reason=" | tail -5
            exit 1
          fi
          echo "Auth clean on reconnect — no token_mismatch / token_missing"

      - name: Tear down production
        if: always()
        run: docker compose down -v

      - name: Start dev stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for health (dev)
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/internal/openclaw-config-ready; then
              echo "Dev stack ready (bootInits complete)"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
              docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "Dev health check failed"
          docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy
          exit 1

      - name: Verify infrastructure ready (dev)
        run: |
          for i in $(seq 1 15); do
            BODY=$(curl -sf http://localhost:7777/api/setup/status 2>/dev/null || echo '{}')
            DB=$(echo "$BODY" | jq -r '.infrastructure.database // "unknown"')
            OC=$(echo "$BODY" | jq -r '.infrastructure.openclaw // "unknown"')
            if [ "$DB" = "connected" ] && [ "$OC" = "connected" ]; then
              echo "Infrastructure ready (database=$DB, openclaw=$OC)"
              exit 0
            fi
            echo "Attempt $i: database=$DB, openclaw=$OC"
            sleep 2
          done
          echo "::error::Infrastructure not ready: database=$DB, openclaw=$OC"
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy openclaw
          exit 1

      - name: Run setup wizard (dev)
        run: |
          STATUS=$(curl -s -o /tmp/setup-response.json -w "%{http_code}" \
            -X POST http://localhost:7777/api/setup \
            -H "Content-Type: application/json" \
            -H "Origin: http://localhost:7777" \
            -d '{"name":"CI Admin","email":"ci@test.local","password":"CiTestPass123!"}')
          echo "Setup response (HTTP $STATUS):"
          cat /tmp/setup-response.json
          if [ "$STATUS" -ne 201 ]; then
            echo "Setup failed with status $STATUS"
            docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy
            exit 1
          fi
          echo "Setup completed successfully"

      - name: Verify OpenClaw connection (dev)
        run: |
          # Same exponential-backoff window as the production verify above:
          # setup wizard's SIGUSR1 means Pinchy can take ~60-90s to reconnect.
          echo "Waiting for OpenClaw connection after setup..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connection verified (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw Gateway"
              docker compose -f docker-compose.yml -f docker-compose.dev.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done
          # Note: plugin ownership check skipped for dev — bind-mounted plugins
          # inherit CI runner uid (not root), which OpenClaw blocks. The production
          # stack test already covers plugin ownership verification.

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v

  end-user-install:
    name: End-user install simulation
    needs: [changes, build-image]
    # See docker-smoke: build-image is skipped both on fork PRs (fall back to a
    # local build) and on docs-only PRs (build nothing) — only the changes gate
    # tells those two apart.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Build production images locally (fork PR fallback)
        if: needs.build-image.result == 'skipped'
        run: |
          docker build -t ghcr.io/heypinchy/pinchy:latest -f Dockerfile.pinchy .
          docker build -t ghcr.io/heypinchy/pinchy-openclaw:latest -f Dockerfile.openclaw .

      - name: Tag images for the test version
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          # Use CI image if available, otherwise fall back to locally-built :latest
          PINCHY_SRC="${{ needs.build-image.outputs.pinchy-image || 'ghcr.io/heypinchy/pinchy:latest' }}"
          OPENCLAW_SRC="${{ needs.build-image.outputs.openclaw-image || 'ghcr.io/heypinchy/pinchy-openclaw:latest' }}"
          docker tag "$PINCHY_SRC" "ghcr.io/heypinchy/pinchy:test-${SHORT_SHA}"
          docker tag "$OPENCLAW_SRC" "ghcr.io/heypinchy/pinchy-openclaw:test-${SHORT_SHA}"

      # Simulate what a real end-user deploy looks like: a fresh directory
      # containing ONLY docker-compose.yml — no source tree, no .env file,
      # no co-located repo. This catches bugs where compose.yml relies on
      # relative bind-mounts (like the `./docs:/pinchy-docs` regression
      # from PR #145) that silently resolve to empty directories in clean
      # deploys while looking healthy in CI's normal repo-checkout runs.
      - name: Prepare clean install directory
        id: install-dir
        run: |
          INSTALL_DIR=$(mktemp -d)
          cp docker-compose.yml "$INSTALL_DIR/"
          echo "path=$INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "Clean install dir: $INSTALL_DIR"
          ls -la "$INSTALL_DIR"

      - name: Write .env for install test
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          {
            echo "PINCHY_VERSION=test-${SHORT_SHA}"
            echo "DB_PASSWORD=$(openssl rand -hex 32)"
          } > .env
          # BETTER_AUTH_SECRET + ENCRYPTION_KEY remain unset on purpose —
          # tests Pinchy's auto-generation path (used by end-users who
          # don't customize .env).
          cat .env | sed 's/=.*/=<redacted>/'

      - name: Start stack from clean install dir
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose up -d

      - name: Wait for health
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Stack healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            if [ "$i" -eq 1 ] || [ $((i % 5)) -eq 0 ]; then
              docker compose ps
              docker compose logs --tail=20 pinchy
            fi
            sleep 2
          done
          echo "::error::Clean-install health check failed"
          docker compose ps
          docker compose logs
          exit 1

      - name: Assert all services running
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          RUNNING=$(docker compose ps --format json | jq -rs '[.[] | select(.State == "running")] | length')
          echo "Running services: $RUNNING"
          if [ "$RUNNING" -ne 3 ]; then
            echo "::error::Expected 3 running services (pinchy, openclaw, db), got $RUNNING"
            docker compose ps
            exit 1
          fi

      - name: Assert pinchy binds to 127.0.0.1 by default (not 0.0.0.0)
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # Docker bypasses UFW — only 127.0.0.1 binding prevents external access.
          # This assertion catches any regression that re-exposes port 7777 globally.
          BINDING=$(docker inspect \
            --format '{{range $p, $c := .NetworkSettings.Ports}}{{range $c}}{{.HostIp}}{{end}}{{end}}' \
            "$(docker compose ps -q pinchy)")
          echo "Pinchy port binding host IP: $BINDING"
          if [ "$BINDING" != "127.0.0.1" ]; then
            echo "::error::Pinchy must bind to 127.0.0.1 by default (got '$BINDING'). Docker bypasses UFW, so 0.0.0.0 exposes the port to the internet regardless of firewall rules."
            exit 1
          fi

      - name: Assert pinchy-docs is populated in openclaw container
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          DOC_COUNT=$(docker compose exec -T openclaw sh -c 'find /pinchy-docs -name "*.mdx" 2>/dev/null | wc -l')
          echo "/pinchy-docs .mdx files in running openclaw container: $DOC_COUNT"
          if [ "$DOC_COUNT" -lt 10 ]; then
            echo "::error::/pinchy-docs is empty or missing in a clean end-user install ($DOC_COUNT .mdx files). The openclaw image must ship docs — no relative bind-mount from compose.yml."
            docker compose exec -T openclaw ls -la /pinchy-docs || true
            exit 1
          fi

      - name: Tear down
        if: always()
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose down -v

  end-user-upgrade:
    name: End-user upgrade simulation
    needs: [changes, build-image]
    # See docker-smoke: build-image is skipped both on fork PRs (fall back to a
    # local build) and on docs-only PRs (build nothing) — only the changes gate
    # tells those two apart.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh release list returns newest-first (gh CLI v2 default).
          # .[0] is the most recent release — the version real users are upgrading from.
          TAG=$(gh release list --repo heypinchy/pinchy --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$TAG" ]; then
            echo "::notice::No previous release found — skipping upgrade test."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Previous tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull pre-built CI images (skip on fork PRs)
        if: steps.prev.outputs.skip == 'false' && needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Build this PR's images locally (fork PR fallback)
        if: steps.prev.outputs.skip == 'false' && needs.build-image.result == 'skipped'
        run: |
          docker build -t ghcr.io/heypinchy/pinchy:latest -f Dockerfile.pinchy .
          docker build -t ghcr.io/heypinchy/pinchy-openclaw:latest -f Dockerfile.openclaw .

      - name: Tag images for the test version
        if: steps.prev.outputs.skip == 'false'
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          PINCHY_SRC="${{ needs.build-image.outputs.pinchy-image || 'ghcr.io/heypinchy/pinchy:latest' }}"
          OPENCLAW_SRC="${{ needs.build-image.outputs.openclaw-image || 'ghcr.io/heypinchy/pinchy-openclaw:latest' }}"
          docker tag "$PINCHY_SRC" "ghcr.io/heypinchy/pinchy:test-${SHORT_SHA}"
          docker tag "$OPENCLAW_SRC" "ghcr.io/heypinchy/pinchy-openclaw:test-${SHORT_SHA}"

      - name: Generate shared DB_PASSWORD for both phases
        if: steps.prev.outputs.skip == 'false'
        id: shared
        # Postgres fixes DB_PASSWORD on the volume's first init. Phase 1 and
        # phase 2 must use the same password or phase 2 fails auth against the
        # persisted volume. Generate once, reuse across phases.
        run: echo "db_password=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"

      - name: Prepare clean install directory
        if: steps.prev.outputs.skip == 'false'
        id: install-dir
        run: |
          INSTALL_DIR=$(mktemp -d)
          echo "path=$INSTALL_DIR" >> "$GITHUB_OUTPUT"

      - name: Phase 1 — fetch previous release's docker-compose.yml
        if: steps.prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/heypinchy/pinchy/${{ steps.prev.outputs.tag }}/docker-compose.yml" \
            -o docker-compose.yml

      - name: Phase 1 — pin previous compose's :latest to the previous tag
        if: steps.prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # The previous release's compose file hardcodes :latest for image
          # tags (it predates Scope 2's ${PINCHY_VERSION:?} shape). Without
          # pinning, docker compose pull would fetch whatever :latest points
          # to right now — defeating the whole point of "upgrade from the
          # previous release."
          sed -i "s|:latest|:${{ steps.prev.outputs.tag }}|g" docker-compose.yml
          grep -E '^\s*image:' docker-compose.yml

      - name: Phase 1 — write .env for previous release
        if: steps.prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # The previous step pinned image tags inline, so PINCHY_VERSION
          # here is redundant for phase 1 — but we include it so phase 1 and
          # phase 2 .env files are structurally identical, which mirrors what
          # real users do and simplifies debugging.
          {
            echo "PINCHY_VERSION=${{ steps.prev.outputs.tag }}"
            echo "DB_PASSWORD=${{ steps.shared.outputs.db_password }}"
          } > .env

      - name: Phase 1 — pull previous version's images
        id: pull-prev
        if: steps.prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # Capture pull output so we can distinguish failures we can do
          # nothing about from real pull failures (network, registry down):
          #   * Missing previous-version images (GHCR retention etc.) — see
          #     PR #212 for the original incident.
          #   * Docker Hub org-wide rate-limit exhaustion — pulls of
          #     postgres:17 etc. through mirror.gcr.io fall back to Docker
          #     Hub when the mirror has a miss, and the org's anonymous
          #     bucket is regularly drained by parallel CI runs. Same
          #     not-our-fault category as missing images, same response.
          # Missing previous-version images make the upgrade test impossible
          # to run, but they are not a regression in *this* PR — skip with a
          # warning instead of failing.
          #
          # Transient GHCR token-endpoint timeouts ("request canceled
          # (Client.Timeout exceeded while awaiting headers)") are not the
          # registry being down — they're brief network blips that retry away.
          # The pull is retried up to 3 times with 10s backoff before any
          # skip/fail classification kicks in. See #351 for the incident.
          set +e
          attempt=1
          max_attempts=3
          while [ "$attempt" -le "$max_attempts" ]; do
            docker compose pull 2>&1 | tee pull.log
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              break
            fi
            # Don't retry skippable conditions — they won't change on retry.
            if grep -qE "manifest unknown|not found|toomanyrequests|pull rate limit" pull.log; then
              break
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "::warning::docker compose pull failed (attempt ${attempt}/${max_attempts}). Retrying in 10s..."
              sleep 10
            fi
            attempt=$((attempt + 1))
          done
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -qE "manifest unknown|not found" pull.log; then
              echo "::warning::Previous release (${{ steps.prev.outputs.tag }}) images are no longer available in GHCR. Skipping upgrade test — this is not a regression in this PR. See issue #213 for the prune-mechanism rebuild that prevents this from recurring."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if grep -qE "toomanyrequests|pull rate limit" pull.log; then
              echo "::warning::Docker Hub rate-limit exhausted for the org during this run (mirror.gcr.io fell back to docker.io and was throttled). Skipping upgrade test — not a regression in this PR."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::docker compose pull failed ${max_attempts}× for an unexpected reason (not missing-image, not rate-limit). See pull.log above."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Phase 1 — start previous version and wait healthy
        if: steps.prev.outputs.skip == 'false' && steps.pull-prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/api/health; then
              echo "Previous version healthy"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            sleep 2
          done
          echo "::error::Previous version (${{ steps.prev.outputs.tag }}) did not come up"
          docker compose logs
          exit 1

      - name: Phase 2 — swap to this PR's compose file + images
        if: steps.prev.outputs.skip == 'false' && steps.pull-prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          docker compose stop
          # Swap in this PR's docker-compose.yml (new PINCHY_VERSION-based shape).
          cp "${GITHUB_WORKSPACE}/docker-compose.yml" docker-compose.yml
          # Update PINCHY_VERSION in .env, keep DB_PASSWORD (Postgres fixed it on
          # volume init during phase 1).
          sed -i "s|^PINCHY_VERSION=.*|PINCHY_VERSION=test-${SHORT_SHA}|" .env
          docker compose up -d
          for i in $(seq 1 60); do
            # 60s because migrations may run on startup
            if curl -sf http://localhost:7777/api/health; then
              echo "Upgraded version healthy — migrations succeeded"
              exit 0
            fi
            echo "Attempt $i: not ready yet"
            sleep 2
          done
          echo "::error::Upgrade from ${{ steps.prev.outputs.tag }} did not come up healthy"
          docker compose logs
          exit 1

      - name: Assert pinchy still binds to 127.0.0.1 after upgrade (not 0.0.0.0)
        if: steps.prev.outputs.skip == 'false' && steps.pull-prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: |
          # Docker bypasses UFW — only 127.0.0.1 binding prevents external access.
          # Assert the upgrade path doesn't re-expose port 7777 globally (regression guard).
          BINDING=$(docker inspect \
            --format '{{range $p, $c := .NetworkSettings.Ports}}{{range $c}}{{.HostIp}}{{end}}{{end}}' \
            "$(docker compose ps -q pinchy)")
          echo "Pinchy port binding host IP after upgrade: $BINDING"
          if [ "$BINDING" != "127.0.0.1" ]; then
            echo "::error::Pinchy must bind to 127.0.0.1 after upgrade (got '$BINDING'). Docker bypasses UFW, so 0.0.0.0 exposes the port to the internet regardless of firewall rules."
            exit 1
          fi

      - name: Tear down
        if: always() && steps.prev.outputs.skip == 'false' && steps.pull-prev.outputs.skip == 'false'
        working-directory: ${{ steps.install-dir.outputs.path }}
        run: docker compose down -v

  odoo-e2e:
    name: Odoo E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    # See docker-smoke on why the changes gate is explicit rather than inferred
    # from build-image being skipped.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read

    # Production-image CI test (Tier 2 of the dev/prod parity work, #196):
    # images are built locally via docker-compose.e2e.yml using the
    # production Dockerfile.pinchy (uid 999 demotion via entrypoint.sh),
    # matching what end users actually run. Catches uid/permission
    # mismatches between Pinchy (uid 999) and OpenClaw (root).
    #
    # The earlier attempt to land this (PR #195) reverted because Playwright's
    # browser-form login flow hit Better Auth's NODE_ENV=production rate
    # limit (3 sign-ins / 10s per IP) — the loginViaUI calls across odoo
    # specs blew through it after 3-4 attempts. PINCHY_E2E_DISABLE_AUTH_RATE_LIMIT=1
    # in docker-compose.e2e.yml disables that limit only for this E2E stack.
    env:
      PINCHY_VERSION: latest
      DB_PASSWORD: pinchy-ci-smoke-pass

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start test stack with mock Odoo (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start test stack with mock Odoo (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for mock Odoo..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9002/control/health >/dev/null 2>&1; then
              echo "Mock Odoo healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Mock Odoo not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml logs odoo-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      - name: Run Odoo E2E tests
        run: pnpm -C packages/web test:e2e:odoo
        env:
          CI: true

      - name: Capture diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml"
          mock-service: "odoo-mock"
          artifact-name: "odoo-e2e"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.odoo-test.yml down -v

