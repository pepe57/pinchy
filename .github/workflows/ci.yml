          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start test stack with GreenMail (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start test stack with GreenMail (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for imap-mock..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9006/control/health >/dev/null 2>&1; then
              echo "imap-mock healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::imap-mock not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml logs imap-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      - name: Run IMAP E2E tests
        run: pnpm -C packages/web test:e2e:imap
        env:
          CI: true
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Capture diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml"
          # greenmail speaks raw SMTP/IMAP (no HTTP control surface of its own),
          # so capture both the mock sidecar and the greenmail server logs.
          mock-service: "imap-mock greenmail"
          artifact-name: "imap-e2e"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.imap-test.yml down -v

  # Sharded across two runners: at 8m22 of test time this was the longest job in
  # the matrix, and the matrix tail IS the run's wall-clock. The cost is real but
  # bounded — each shard pays the ~4m30 fixed overhead (image pull, stack boot)
  # again — so only the two longest suites are worth splitting. Don't shard the
  # cheaper ones: below roughly 6 min of test time a second stack costs more than
  # it saves.
  #
  # Sharding is across JOBS, one Docker stack each, and NOT via Playwright
  # workers. `playwright.setup-wizard.config.ts` pins `workers: 1` on purpose:
  # every spec calls `resetStack()`, which truncates the DB and restarts
  # containers. Two specs sharing a stack would wipe each other's state
  # mid-flight. Per-shard stacks keep that invariant intact.
  #
  # Safe to shard because this job is NOT a required check. Never do this to
  # quality / vitest-integration / e2e (see REQUIRED_JOBS in
  # scripts/lib/ci-path-filter.mjs): a matrix renames the check, branch
  # protection would wait forever on a name that no longer reports, and main
  # would be unmergeable.
  setup-wizard-e2e:
    name: Setup Wizard E2E Tests (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    # See docker-smoke on why the changes gate is explicit rather than inferred
    # from build-image being skipped.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read

    strategy:
      # A failure in shard 1 says nothing about shard 2 — they run disjoint
      # specs. Cancelling the other half would just hide the second failure.
      fail-fast: false
      matrix:
        shard: [1, 2]

    env:
      PINCHY_VERSION: latest
      DB_PASSWORD: pinchy-ci-smoke-pass
      COMPOSE_FILES: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.setup-wizard-test.yml"

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start test stack with mock LLM providers (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: docker compose $COMPOSE_FILES up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start test stack with mock LLM providers (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: docker compose $COMPOSE_FILES up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose $COMPOSE_FILES logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for mock LLM providers..."
          for i in $(seq 1 15); do
            if docker compose $COMPOSE_FILES exec -T llm-providers-mock node -e "fetch('http://localhost:9100/control/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" >/dev/null 2>&1; then
              echo "Mock LLM providers healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Mock LLM providers not healthy after 30s"
              docker compose $COMPOSE_FILES logs llm-providers-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose $COMPOSE_FILES logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose $COMPOSE_FILES logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      # Playwright shards by SPEC FILE, and this suite is one provider per file
      # (anthropic, google, ollama-cloud, ollama-local, openai) — so the 5 files
      # split 3/2 with no test left behind and no file split across shards.
      - name: Run Setup Wizard E2E tests
        run: pnpm -C packages/web test:e2e:setup-wizard --shard=${{ matrix.shard }}/2
        env:
          CI: true
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Capture diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: ${{ env.COMPOSE_FILES }}
          mock-service: "llm-providers-mock"
          # Shard-scoped: upload-artifact rejects a duplicate name within a run,
          # so a bare "setup-wizard-e2e" from both shards would turn a real test
          # failure into a confusing upload error — and lose the diagnostics.
          artifact-name: "setup-wizard-e2e-shard-${{ matrix.shard }}"

      - name: Tear down
        if: always()
        run: docker compose $COMPOSE_FILES down -v

  telegram-e2e:
    name: Telegram E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    # See docker-smoke on why the changes gate is explicit rather than inferred
    # from build-image being skipped.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read

    # Production-image CI test: images are built locally via
    # docker-compose.e2e.yml using the production Dockerfile.pinchy
    # (uid 999 demotion via entrypoint.sh), matching what end users
    # actually run. Catches uid/permission mismatches between Pinchy
    # (uid 999) and OpenClaw (root) — see e.g. PR #195's regression for
    # the telegram-pairing.json mode 0600 case.
    #
    # ${PINCHY_VERSION:?} on docker-compose.yml's `image:` line is
    # satisfied by any non-empty string; the build directive in
    # docker-compose.e2e.yml takes precedence and tags with that name.
    env:
      PINCHY_VERSION: latest
      DB_PASSWORD: pinchy-ci-smoke-pass

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      # Chromium is needed by agent-hot-reload.spec.ts which drives the chat UI.
      # The other Telegram tests are fetch-only, but Playwright still requires
      # a browser binary present at config-load time.
      - uses: ./.github/actions/setup-playwright

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start test stack with mock Telegram (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start test stack with mock Telegram (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml up --build -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for mock Telegram..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9001/control/health >/dev/null 2>&1; then
              echo "Mock Telegram healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Mock Telegram not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs telegram-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - name: Run Telegram E2E tests
        run: pnpm -C packages/web test:e2e:telegram
        env:
          CI: true

      - name: Show logs on failure
        if: failure()
        run: |
          # Container state first — if a container has restarted or exited, the
          # log tails below tell a confusing story (truncated at the wrong end).
          # In run 25261606990 OpenClaw stopped emitting logs ~3 min before the
          # test 10 timeout: docker compose ps reveals whether that was a crash,
          # a restart loop, or just a quiet healthy process.
          echo "=== Container state ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml ps --all 2>&1 || true
          # Mock telegram is the primary diagnostic for the known flake:
          # we need to see every bot token that ever polled, not just the last
          # 30 lines. Each bot pings getUpdates every ≤30s, so a 7-test suite
          # easily logs hundreds of lines. tail -2000 covers a full run.
          echo "=== Mock Telegram health snapshot ==="
          curl -sf http://localhost:9001/control/health | jq . || echo "health endpoint unreachable"
          echo "=== Mock Telegram all bot responses ==="
          curl -sf 'http://localhost:9001/control/responses' | jq . || echo "responses endpoint unreachable"
          # Definitive answer to "what token does OpenClaw think is configured?":
          # the openclaw.json file Pinchy writes and OpenClaw reads. If this
          # disagrees with the DB-side telegram_bot_token settings (also dumped
          # below), the targeted-write race in updateTelegramChannelConfig is
          # the culprit. If they agree but mock polls a stale token, OpenClaw's
          # channel restart isn't picking up the file change.
          echo "=== Pinchy openclaw.json (from Pinchy container — same bind mount as OpenClaw) ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml exec -T pinchy cat /openclaw-config/openclaw.json 2>/dev/null | jq '{bindings, channels: .channels, sessionScope: .session.dmScope, agents: (.agents.list | length)}' || echo "openclaw.json not readable"
          echo "=== Pinchy DB telegram_bot_token settings ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml exec -T db psql -U pinchy -d pinchy -c "SELECT key, LEFT(value, 30) AS value_preview, encrypted FROM settings WHERE key LIKE 'telegram_%' ORDER BY key;" 2>/dev/null || echo "db not readable"
          echo "=== Mock Telegram logs (full) ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs telegram-mock 2>&1 | tail -2000
          # OpenClaw: 3000 because tail -500 only covered the initial setup
          # (~90s) and missed Test 10's failure window — see PR-CI run
          # 25260750434, where OpenClaw activity after 20:16:50 (Multi-Bot
          # connectBot) was truncated. We need the full restart trace post-
          # connect to confirm whether the second account's provider ever
          # starts.
          echo "=== OpenClaw logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs openclaw 2>&1 | tail -3000
          echo "=== Pinchy logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml logs pinchy 2>&1 | tail -500

      - name: Capture full diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml"
          mock-service: "telegram-mock"
          artifact-name: "telegram-e2e"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.test.yml down -v

  # Sharded for the same reason as setup-wizard-e2e (see the rationale there):
  # 8m17 of test time made this the second-longest tail in the matrix, and its 18
  # spec files divide cleanly. Also not a required check, so the matrix rename is
  # safe.
  #
  # Per-shard stacks are a bonus here rather than a constraint: today the whole
  # suite shares ONE OpenClaw session, which is why triggers like SLOW_STREAM
  # need word lists no other spec can produce (see fake-ollama-server.ts). Two
  # stacks mean two sessions and strictly less cross-spec interference, never
  # more.
  integration:
    name: Integration Tests (OpenClaw + Fake Ollama) (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    # See docker-smoke on why the changes gate is explicit rather than inferred
    # from build-image being skipped.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    strategy:
      # Disjoint specs — a failure in one shard says nothing about the other.
      fail-fast: false
      matrix:
        shard: [1, 2]
    permissions:
      contents: read
      packages: read

    # Production-image CI test (Tier 3 of the dev/prod parity work, #196).
    # Pinchy is built from `Dockerfile.pinchy` (uid 999 demotion via
    # entrypoint.sh) inside the compose stack, like every other E2E suite.
    # ${PINCHY_VERSION:?} on docker-compose.yml's `image:` line is satisfied
    # by any non-empty string; the build directive in docker-compose.e2e.yml
    # takes precedence when PINCHY_IMAGE is not set.
    env:
      PINCHY_VERSION: latest
      DB_PASSWORD: pinchy-ci-smoke-pass

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Build Pinchy and OpenClaw images locally (fork PR fallback)
        if: needs.build-image.result == 'skipped'
        run: |
          docker build -t pinchy:e2e -f Dockerfile.pinchy .
          docker build -t pinchy-openclaw:e2e -f Dockerfile.openclaw .

      # On Linux, host.docker.internal doesn't resolve outside containers by
      # default. globalSetup spawns fake Ollama on the host and probes it from
      # inside the OpenClaw container; this entry is a defensive fallback for
      # helpers that fetch host URLs from the host side too.
      - name: Add host.docker.internal to /etc/hosts
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Start integration stack (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: |
          docker compose -f docker-compose.yml \
                         -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml \
                         up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Start integration stack (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: |
          docker compose -f docker-compose.yml \
                         -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml \
                         up -d
        env:
          BETTER_AUTH_SECRET: ci-test-secret-not-for-production
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Wait for Pinchy to be ready
        run: |
          echo "Waiting for Pinchy at localhost:7779..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7779/api/internal/openclaw-config-ready >/dev/null 2>&1; then
              echo "Pinchy ready (attempt $i)"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not ready after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                             -f docker-compose.integration.yml logs pinchy
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      - name: Run integration tests
        run: pnpm -C packages/web test:integration --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== OpenClaw logs (captured by globalTeardown before stack-down) ==="
          cat /tmp/openclaw-integration.log 2>/dev/null || echo "no captured log file"
          echo ""
          echo "=== Container state ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml ps --all 2>&1 || true
          echo "=== Pinchy logs ==="
          # 1500 lines: a per-tool dispatch generates ~5 lines (request +
          # broadcasts + complete), 16 tests in this suite x ~3 chats avg ≈
          # 240 chat-related lines, plus a healthy buffer for startup +
          # restart + memory-audit-watcher chatter. 500 was eating Test 7's
          # window before Test 12's failure could be triaged (PR #442 CI runs
          # 26506915089 + 26510486357 — both Domain Lock failures with
          # truncated logs).
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs pinchy 2>&1 | tail -1500
          echo "=== OpenClaw logs (live) ==="
          # 5000 lines: every chat dispatch generates a multi-line
          # `[agent/embedded] [trace:embedded-run] core-plugin-tool stages: ...`
          # entry (~1KB single-line trace) plus the `[ws] ⇄ res ✓ agent` line
          # plus stream chunks. 1500 lines covered ~4-5 chats; the integration
          # suite runs 16 tests with multiple chats each. Bumped after the
          # PR #442 Domain Lock investigation — only the FIRST test's agent
          # RPC was visible in the prior tail window, hiding evidence of
          # what test 12 actually dispatched to OC.
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs openclaw 2>&1 | tail -5000
          echo "=== DB logs ==="
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml logs db 2>&1 | tail -50

      - name: Capture full diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.integration.yml"
          # Integration suite runs fake-Ollama on the host, not as a compose
          # service — no mock to capture, the globalTeardown-captured
          # /tmp/openclaw-integration.log is already shown above.
          # Shard-scoped: upload-artifact rejects duplicate names within a run.
          artifact-name: "integration-shard-${{ matrix.shard }}"

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
                         -f docker-compose.integration.yml down -v 2>/dev/null || true

  eval-selftest:
    # Deterministic self-test of the Eval-v1 model-reliability harness
    # (pinchy#669): fake-ollama-backed, keyless, no real model calls. Guards the
    # harness itself — graders, trajectory normalization, the Playwright
    # collector, and the eval compose stack wiring — so a refactor can't
    # silently break the benchmark pipeline the published reliability data
    # (heypinchy.com/reliability) depends on. Real-model sweeps stay out of CI
    # (stochastic + paid); see #669 for the on-demand/scheduled follow-ups.
    name: Eval Harness Self-Test
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    # See docker-smoke on why the changes gate is explicit rather than inferred
    # from build-image being skipped.
    if: >-
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.build-image.result == 'success' ||
       needs.build-image.result == 'skipped')
    permissions:
      contents: read
      packages: read

    env:
      PINCHY_VERSION: latest
      # Must be non-default and consistent between the compose stack and the
      # eval:selftest script (which bakes eval_dev_pw as its fallback).
      DB_PASSWORD: eval_dev_pw

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/docker-mirror

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-pnpm

      - name: Pull pre-built CI images (skip on fork PRs)
        if: needs.build-image.result == 'success'
        uses: ./.github/actions/pull-ci-images
        with:
          pinchy-image: ${{ needs.build-image.outputs.pinchy-image }}
          openclaw-image: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start eval stack (CI — pre-built images)
        if: needs.build-image.result == 'success'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml up -d
        env:
          PINCHY_IMAGE: ${{ needs.build-image.outputs.pinchy-image }}
          OPENCLAW_IMAGE: ${{ needs.build-image.outputs.openclaw-image }}

      - name: Start eval stack (fork PR fallback — local build)
        if: needs.build-image.result == 'skipped'
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml up --build -d

      - name: Wait for services
        run: |
          echo "Waiting for Pinchy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7781/api/health >/dev/null 2>&1; then
              echo "Pinchy healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy not healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml logs pinchy
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for Odoo mock..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9502/control/health >/dev/null 2>&1; then
              echo "Odoo mock healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Odoo mock not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml logs odoo-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for Graph mock..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9505/control/health >/dev/null 2>&1; then
              echo "Graph mock healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "::error::Graph mock not healthy after 30s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml logs graph-mock
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for OpenClaw connection..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml logs pinchy 2>&1 | grep -q "Connected to OpenClaw Gateway"; then
              echo "OpenClaw connected (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Pinchy never connected to OpenClaw"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml logs pinchy openclaw
              exit 1
            fi
            sleep 2
          done

      - uses: ./.github/actions/setup-playwright

      - name: Run eval harness self-test
        run: pnpm -C packages/web eval:selftest

      - name: Capture diagnostics on failure
        if: failure()
        uses: ./.github/actions/capture-e2e-diagnostics
        with:
          compose-files: "-f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml"
          mock-service: "odoo-mock graph-mock"
          artifact-name: "eval-selftest"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.eval.yml down -v

  ollama-integration:
    name: Ollama integration tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Install Ollama
        # Retry the whole install: ollama's installer downloads a binary from a
        # CDN that intermittently returns a transient 504, which then feeds a
        # partial body into zstd/tar and fails the step — not a real error.
        run: |
          for attempt in 1 2 3; do
            if curl -fsSL https://ollama.com/install.sh | sh; then exit 0; fi
            echo "Ollama install attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Ollama install failed after 3 attempts"
          exit 1

      - name: Start Ollama
        run: |
          ollama serve &
          # Wait for Ollama to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Ollama failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Pull test model
        run: ollama pull qwen2.5:0.5b

      - name: Run Ollama integration tests
        run: pnpm --filter @pinchy/web exec vitest run src/__tests__/integration/ollama-provider.test.ts
        env:
          OLLAMA_URL: http://localhost:11434

  # Deliberately NOT gated on `changes`: this job checks `**/*.md` / `**/*.mdx`,
  # i.e. exactly the files a "docs-only" PR consists of. Gating it would skip the
  # link check on precisely the PRs that edit links. It is cheap (checkout + one
  # lychee run), so it runs on every PR.
  links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --accept treats transient server responses (rate-limit + 5xx, e.g.
          # GitHub returning a 504 during a brief outage) as OK so they don't
          # red-light unrelated PRs. Genuinely broken links (404/410) still fail.
          # github.com/heypinchy/website is excluded because it's a SEPARATE
          # PRIVATE repo: the job's GITHUB_TOKEN is scoped to this repo only, so
          # lychee gets a 404 even though the link is valid for maintainers. The
          # release docs intentionally cross-reference it.
          # github.com/heypinchy/pinchy/stargazers is excluded because GitHub
          # gates the stargazers LIST sub-page behind abuse/rate-limit protection
          # and intermittently 404s it to lychee's crawler even though the repo
          # is public and the link resolves in a browser (verified 2026-07-06:
          # the repo root and /issues, /releases, /discussions all return 200,
          # only /stargazers 404s). It's a decorative stars-badge click-through,
          # not documentation, so its false-positive 404 must not red-light every
          # PR — the badge IMAGE (img.shields.io/github/stars) is checked normally.
          args: "--no-progress --max-retries 3 --retry-wait-time 5 --accept '200..=299,429,500..=599' '**/*.md' '**/*.mdx' --exclude-path node_modules --exclude-path .git --exclude-path docs --exclude 'localhost' --exclude 'github\\.com/heypinchy/website' --exclude 'github\\.com/heypinchy/pinchy/stargazers' --exclude 'linkedin\\.com' --exclude 'sonner\\.emilkowal\\.dev' --exclude 'squawkhq\\.com' --exclude 'contributor-covenant\\.org' --exclude 'star-history\\.com'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Vulnerability scan via osv-scanner — replaces the old `pnpm audit` step
  # that broke when npm retired the /security/audits/quick endpoint (returns
  # 410 unconditionally). osv-scanner reads pnpm-lock.yaml directly and
  # queries the OSV database, so we don't need an npm install and don't
  # depend on npm's legacy audit API.
  vuln-scan:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      scan-args: |-
        --config=./osv-scanner.toml
        --lockfile=./pnpm-lock.yaml
        --lockfile=./docs/pnpm-lock.yaml
    permissions:
      actions: read
      security-events: write
      contents: read

  repo-hygiene:
    name: Repo hygiene
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check for local paths in codebase
        run: |
          # Block local absolute paths that should never be committed
          PATTERNS='/Users/|C:\\Users\\|C:/Users/'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md' 2>/dev/null; then
            echo "::error::Local absolute paths found in codebase:"
            git grep -nEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!.husky/' ':!*.md'
            exit 1
          fi
          echo "No local paths detected"

      - name: Check for secrets in codebase
        run: |
          # Check for common secret patterns in tracked files
          PATTERNS='(AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{20,}|-----BEGIN (RSA |EC )?PRIVATE KEY-----|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})'
          if git grep -lEI "$PATTERNS" -- ':!*.lock' ':!.github/' ':!*.test.*' ':!*.md' 2>/dev/null; then
            echo "::error::Potential secrets found in codebase"
            exit 1
          fi
          echo "No secrets detected"
