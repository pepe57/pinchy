name: "Setup pnpm + Node.js with cache"
description: "Standardized pnpm install with workspace cache, used across all CI jobs."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  install:
    description: "Run pnpm install --frozen-lockfile after setup"
    required: false
    default: "true"
  install-args:
    description: "Extra args appended to pnpm install (e.g. --filter=@pinchy/web)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        # Only enable pnpm cache when we're going to actually run
        # `pnpm install` below — otherwise setup-node@v4's Post-step
        # tries to save a never-populated pnpm store and fails with
        # "Path Validation Error: Path(s) specified in the action for
        # caching do(es) not exist", failing the entire job. The CodeQL
        # workflow hit this every run since setup-node@v4 tightened the
        # path check around 2026-05-23.
        cache: ${{ inputs.install == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile ${{ inputs.install-args }}
